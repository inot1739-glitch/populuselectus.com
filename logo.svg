<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c96d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b5f3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8a5a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Hexagon with PE -->
  <polygon points="22,4 38,4 46,18 38,32 22,32 14,18" fill="url(#green)" />
  <polygon points="24,7 36,7 42,18 36,29 24,29 18,18" fill="none" stroke="url(#gold)" stroke-width="1.2" />
  <text x="30" y="23" font-family="Georgia, serif" font-size="13" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="-0.5">PE</text>

  <!-- Wordmark -->
  <text x="54" y="22" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#2b5f3e" letter-spacing="-0.3">Populus</text>
  <text x="130" y="22" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#c9a84c" letter-spacing="-0.3">Electus</text>

  <!-- Tagline -->
  <text x="54" y="33" font-family="Arial, sans-serif" font-size="6.5" fill="#6b6b6b" letter-spacing="1.5">CHOSEN TO GROW</text>
</svg>
